server {
    listen 80;

    # AWS DNS Resolver (Required for dynamic DNS in VPCs)
    resolver 172.31.0.2 valid=30s;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Proxy to Gateway Health Check (Testing)
    location /gateway-health {
        proxy_pass http://gateway.sems.internal:4000/health;
    }

    # Proxy API requests to the Gateway
    location /api {
        set $upstream http://gateway.sems.internal:4000;
        proxy_pass $upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
